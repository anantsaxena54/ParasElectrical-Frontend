<section class="industries section" id="industries">
  <div class="container">
    <div class="industries-header">
      <div class="section-tag center">
        <span class="dot"></span>
        <span>Build for every industry</span>
      </div>
      <h2 class="industries-title">
        <span class="highlight">Industries</span> We Serve
      </h2>
    </div>

    <div class="industries-card">
      <aside class="industries-sidebar">
        @for (ind of industries; track ind.name; let i = $index) {
          <button
            type="button"
            class="ind-tab"
            [class.active]="i === activeIndex"
            (click)="setActive(i)"
          >
            {{ ind.name }}
          </button>
        }
      </aside>

      <div class="industries-content" [attr.data-active]="activeIndex">
        <div class="ind-image">
          <img [src]="active.img" [alt]="active.name" />
        </div>

        <div class="ind-text">
          <div class="ind-icon-box" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <path d="M16 3h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-3" />
              <path d="M12 12V3" />
              <path d="M9 7h6" />
            </svg>
          </div>
          <h3 class="ind-name">{{ active.name }}</h3>
          <p class="ind-desc">{{ active.desc }}</p>
          <ul class="ind-features">
            @for (f of active.features; track f) {
              <li>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <polyline points="20 6 9 17 4 12" />
                </svg>
                <span>{{ f }}</span>
              </li>
            }
          </ul>
        </div>
      </div>
    </div>
  </div>
</section>
