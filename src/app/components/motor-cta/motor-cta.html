<section class="motor-cta">
  <div class="cta-bg" aria-hidden="true"></div>
  <div class="container">
    <div class="cta-card">
      <h2 class="cta-title">
        Reliable Industrial
        <span class="highlight">Motor Solutions</span>
      </h2>

      <ul class="cta-features">
        @for (f of features; track f) {
          <li>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <path d="M5 12l5 5L20 7" />
            </svg>
            <span>{{ f }}</span>
          </li>
        }
      </ul>

      <a href="#capabilities" class="cta-btn">
        <span>Our Capabilities</span>
        <span class="cta-arrow">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 12h14M12 5l7 7-7 7" />
          </svg>
        </span>
      </a>

      <div class="cta-social">
        <div class="cta-avatars" aria-hidden="true">
          <img src="/images/team_1.png" alt="" />
          <img src="/images/team_2.png" alt="" />
          <img src="/images/team_3.png" alt="" />
        </div>
        <div class="cta-rating">
          <div class="stars" aria-label="5 out of 5">
            @for (s of [1,2,3,4,5]; track s) {
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
              </svg>
            }
          </div>
          <span class="rating-text">Happy clients worldwide</span>
        </div>
      </div>
    </div>
  </div>
</section>
