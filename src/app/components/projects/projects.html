<section class="projects section" id="projects">
  <div class="container">
    <div class="projects-header">
      <div class="projects-heading">
        <div class="section-tag">
          <span class="dot"></span>
          <span>Real-world success</span>
        </div>
        <h2 class="projects-title">
          <span class="highlight">Projects &amp; Work</span> Experience
        </h2>
      </div>

      <div class="carousel-controls" role="group" aria-label="Projects carousel">
        <button type="button" class="ctrl-btn" aria-label="Previous project" (click)="prev()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
        </button>
        <button type="button" class="ctrl-btn" aria-label="Next project" (click)="next()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M5 12h14M12 5l7 7-7 7" />
          </svg>
        </button>
      </div>
    </div>

    <article class="project-featured" [attr.data-active]="activeIndex">
      <div class="project-content">
        <div class="project-glow" aria-hidden="true"></div>
        <div class="project-text">
          <h3 class="project-title">{{ active.title }}</h3>
          <p class="project-desc">{{ active.desc }}</p>
        </div>

        <div class="project-bottom">
          <span class="project-tag">{{ active.tag }}</span>
          <a href="#contact" class="btn-view-case">
            <span>View case</span>
            <span class="case-arrow">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M5 12h14M12 5l7 7-7 7" />
              </svg>
            </span>
          </a>
        </div>
      </div>

      <div class="project-media">
        <img [src]="active.img" [alt]="active.title" />
      </div>
    </article>

    <div class="conversation-cta">
      <div class="conv-left">
        <div class="conv-avatars" aria-hidden="true">
          <img src="/images/team_1.png" alt="" class="conv-avatar" />
          <img src="/images/team_2.png" alt="" class="conv-avatar" />
        </div>
        <div class="conv-text">
          <h3 class="conv-title">Open a conversation</h3>
          <p class="conv-desc">Contact us to explore solutions tailored to your needs.</p>
        </div>
      </div>

      <a href="#contact" class="btn-contact-now">
        <span>Contact us now</span>
        <span class="contact-arrow">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 12h14M12 5l7 7-7 7" />
          </svg>
        </span>
      </a>
    </div>
  </div>
</section>
